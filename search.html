<script>
  (function () {
    var storageKey = 'site-theme';
    var root = document.documentElement;
    var storedTheme = null;

    try {
      storedTheme = window.localStorage.getItem(storageKey);
    } catch (error) {
      console.warn('Unable to read the saved theme preference.', error);
    }

    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = storedTheme === 'light' || storedTheme === 'dark'
      ? storedTheme
      : (prefersDark ? 'dark' : 'light');

    root.setAttribute('data-theme', theme);
    root.style.colorScheme = theme;
    window.__siteTheme = {
      storageKey: storageKey,
      initialTheme: theme
    };
  })();
</script>

  // Copy-link button for the share bar
  function copyPostLink() {
    if (!navigator.clipboard) {
      console.warn('Clipboard API is not available in this browser.');
      return;
    }

    navigator.clipboard.writeText(window.location.href).then(function () {
      var btn = document.getElementById('copy-link-btn');

      if (btn) {
        btn.textContent = 'Copied';
        window.setTimeout(function () {
          btn.textContent = 'Copy link';
        }, 2000);
      }
    }).catch(function (error) {
      console.error('Failed to copy the current post link.', error);
    });
  }
</script>

<script>
  (function () {
    var root = document.documentElement;
    var storageKey = (window.__siteTheme && window.__siteTheme.storageKey) || 'site-theme';
    var mediaQuery = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

    function readStoredTheme() {
      try {
        return window.localStorage.getItem(storageKey);
      } catch (error) {
        console.warn('Unable to read the saved theme preference.', error);
        return null;
      }
    }

    function writeStoredTheme(theme) {
      try {
        window.localStorage.setItem(storageKey, theme);
      } catch (error) {
        console.warn('Unable to save the selected theme preference.', error);
      }
    }

    function resolveTheme() {
      var currentTheme = root.getAttribute('data-theme');

      if (currentTheme === 'light' || currentTheme === 'dark') {
        return currentTheme;
      }

      return mediaQuery && mediaQuery.matches ? 'dark' : 'light';
    }

    function syncPrismTheme(theme) {
      var darkThemeLink = document.getElementById('prism-dark-theme');

      if (darkThemeLink) {
        darkThemeLink.media = theme === 'dark' ? 'all' : 'not all';
      }
    }

    function getGiscusTheme(theme) {
      return theme === 'light' ? 'light' : 'dark_dimmed';
    }

    function syncThemeToggle(theme) {
      var nextTheme = theme === 'dark' ? 'light' : 'dark';

      document.querySelectorAll('[data-theme-toggle]').forEach(function (button) {
        var value = button.querySelector('[data-theme-toggle-value]');

        if (value) {
          value.textContent = theme.toUpperCase();
        }

        button.setAttribute('aria-label', 'Switch to ' + nextTheme + ' theme');
        button.setAttribute('title', 'Switch to ' + nextTheme + ' theme');
      });
    }

    function syncGiscusTheme(theme, attempt) {
      var iframe = document.querySelector('iframe.giscus-frame');
      var currentAttempt = attempt || 0;

      if (!iframe) {
        if (currentAttempt < 12) {
          window.setTimeout(function () {
            syncGiscusTheme(theme, currentAttempt + 1);
          }, 250);
        }

        return;
      }

      iframe.contentWindow.postMessage({
        giscus: {
          setConfig: {
            theme: getGiscusTheme(theme)
          }
        }
      }, 'https://giscus.app');
    }

    function applyTheme(theme, options) {
      root.setAttribute('data-theme', theme);
      root.style.colorScheme = theme;
      syncPrismTheme(theme);
      syncThemeToggle(theme);
      syncGiscusTheme(theme);

      if (options && options.persist) {
        writeStoredTheme(theme);
      }
    }

    function handleThemeToggleClick() {
      var nextTheme = resolveTheme() === 'dark' ? 'light' : 'dark';
      applyTheme(nextTheme, { persist: true });
    }

    window.syncGiscusTheme = function (theme) {
      syncGiscusTheme(theme || resolveTheme());
    };

    document.querySelectorAll('[data-theme-toggle]').forEach(function (button) {
      button.addEventListener('click', handleThemeToggleClick);
    });

    applyTheme(resolveTheme());

    if (mediaQuery) {
      var handleSystemThemeChange = function (event) {
        if (readStoredTheme()) {
          return;
        }

        applyTheme(event.matches ? 'dark' : 'light');
      };

      if (typeof mediaQuery.addEventListener === 'function') {
        mediaQuery.addEventListener('change', handleSystemThemeChange);
      } else if (typeof mediaQuery.addListener === 'function') {
        mediaQuery.addListener(handleSystemThemeChange);
      }
    }
  })();
</script>

  <script>
    (function(search) {
      function runSearch() {
        var query = document.getElementById("search-query").value;
        document.getElementById("search-results").replaceChildren();
        if (query.length < 2)
        {
          return;
        }

        search.search(query, function(results) {
          var list = document.createElement("ul");
          if (results.length == 0)
          {
            const li = document.createElement("li");
            li.append("No results found");
            list.appendChild(li);
          }
          else
          {
            for (const res of results)
            {
              const li = document.createElement("li");
              const a = document.createElement("a");
              a.setAttribute("href", res.link);
              a.append(res.title);
              li.appendChild(a);
              list.appendChild(li);
            }
          }
          document.getElementById("search-results").appendChild(list);
        });
      }

      function initializeSearch() {
        var searchField = document.getElementById("search-query");
        searchField.addEventListener("input", runSearch);
        searchField.addEventListener("propertychange", runSearch);
        searchField.addEventListener("paste", runSearch);

        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get("query");
        if (queryParam) {
          searchField.value = queryParam;
          runSearch();
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener("DOMContentLoaded", initializeSearch);
      } else {
        initializeSearch();
      }
    })(search); // The search object is defined in search.js
  </script>
